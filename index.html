<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Radar Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="radar-container">
        <div class="radar-bezel">
            <div class="radar-screen">
                <div class="grid-lines"></div>
                
                <div class="sweep"></div>
                
                <div class="dot dot-1"></div>
                <div class="dot dot-2"></div>
                <div class="dot dot-3"></div>
                <div class="dot dot-4"></div>
                <div class="dot dot-5"></div>
            </div>
        </div>

        <div class="toggle-wrapper">
            <label class="switch">
                <input type="checkbox" id="theme-toggle">
                <span class="slider">
                    <span class="toggle-text" id="toggle-text">Ver. 1</span>
                </span>
            </label>
        </div>

        <div class="credits">
            Developed by Md. Emtiaz Hossain Sami<br>
            Dept. of Software Engineering, Daffodil International University<br>
            © 2026 Copyright
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
